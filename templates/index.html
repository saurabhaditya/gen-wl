<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payroll Workflow Generator</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    .step-card { animation: fadeSlideIn 0.25s ease both; }
    @keyframes fadeSlideIn {
      from { opacity: 0; transform: translateY(6px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .category-ingestion    { --accent: #6366f1; }
    .category-validation   { --accent: #f59e0b; }
    .category-calculation  { --accent: #10b981; }
    .category-approval     { --accent: #ec4899; }
    .category-execution    { --accent: #3b82f6; }
    .category-accounting   { --accent: #8b5cf6; }
    .category-reporting    { --accent: #14b8a6; }
    .category-error_handling { --accent: #ef4444; }
    .step-accent { border-left: 4px solid var(--accent, #6b7280); }
    .connector { width: 2px; height: 20px; background: #e5e7eb; margin: 0 auto; }
    pre { white-space: pre-wrap; word-break: break-all; }
    .streaming-cursor::after {
      content: '▋';
      animation: blink 1s step-end infinite;
    }
    @keyframes blink { 50% { opacity: 0; } }
  </style>
</head>
<body class="bg-gray-50 min-h-screen font-sans">

  <!-- Header -->
  <header class="bg-white border-b border-gray-200 sticky top-0 z-10">
    <div class="max-w-6xl mx-auto px-6 py-4 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <div class="w-8 h-8 bg-indigo-600 rounded-lg flex items-center justify-center">
          <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2" />
          </svg>
        </div>
        <span class="text-xl font-semibold text-gray-900">Payroll Workflow Generator</span>
      </div>
      <span class="text-sm text-gray-400">Powered by Claude</span>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-8">
    <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">

      <!-- LEFT: Input panel -->
      <div class="space-y-6">
        <div>
          <h2 class="text-lg font-semibold text-gray-800 mb-1">Describe your payroll process</h2>
          <p class="text-sm text-gray-500">Describe what you need in plain English. Claude will generate a structured workflow from our component library.</p>
        </div>

        <div>
          <textarea id="prompt"
            class="w-full h-40 border border-gray-300 rounded-xl px-4 py-3 text-sm text-gray-800 placeholder-gray-400
                   focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-transparent resize-none shadow-sm"
            placeholder="e.g. Process monthly payroll for 50 employees, validate hours, calculate federal and California taxes, get manager approval, generate journal entries and post to NetSuite, then send a summary to the finance team."></textarea>
        </div>

        <!-- Example prompts -->
        <div>
          <p class="text-xs font-medium text-gray-500 uppercase tracking-wider mb-2">Example prompts</p>
          <div id="examples" class="space-y-2"></div>
        </div>

        <button id="generateBtn"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-6 rounded-xl
                 transition-colors duration-150 flex items-center justify-center gap-2 shadow-sm">
          <svg id="btnIcon" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />
          </svg>
          <span id="btnText">Generate Workflow</span>
        </button>

        <!-- Validation panel -->
        <div id="validationPanel" class="hidden rounded-xl border p-4 text-sm space-y-2"></div>
      </div>

      <!-- RIGHT: Output panel -->
      <div class="space-y-4">
        <div class="flex items-center justify-between">
          <h2 class="text-lg font-semibold text-gray-800">Generated Workflow</h2>
          <div class="flex items-center gap-2">
            <button id="viewFlow" onclick="setView('flow')"
              class="view-btn px-3 py-1 rounded-lg text-sm font-medium bg-indigo-600 text-white">Flow</button>
            <button id="viewJson" onclick="setView('json')"
              class="view-btn px-3 py-1 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100">JSON</button>
          </div>
        </div>

        <!-- Empty state -->
        <div id="emptyState" class="border-2 border-dashed border-gray-200 rounded-xl h-96 flex flex-col items-center justify-center text-gray-400 gap-3">
          <svg class="w-10 h-10 opacity-40" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
              d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10" />
          </svg>
          <p class="text-sm">Your workflow will appear here</p>
        </div>

        <!-- Flow view -->
        <div id="flowView" class="hidden space-y-1 max-h-[600px] overflow-y-auto pr-1">
          <div id="workflowMeta" class="mb-4 p-4 bg-white rounded-xl border border-gray-200 shadow-sm"></div>
          <div id="flowSteps"></div>
        </div>

        <!-- JSON view -->
        <div id="jsonView" class="hidden">
          <div class="relative">
            <button onclick="copyJson()"
              class="absolute top-3 right-3 text-xs text-gray-400 hover:text-gray-600 bg-white border border-gray-200 rounded-lg px-2 py-1">
              Copy
            </button>
            <pre id="jsonOutput"
              class="bg-gray-900 text-green-400 text-xs rounded-xl p-4 overflow-auto max-h-[600px] leading-relaxed"></pre>
          </div>
        </div>
      </div>
    </div>
  </main>

  <script>
    let currentView = 'flow';
    let currentWorkflow = null;

    const CATEGORY_COLORS = {
      ingestion:     { bg: 'bg-indigo-50',   border: 'border-indigo-200', text: 'text-indigo-700',  dot: 'bg-indigo-500'  },
      validation:    { bg: 'bg-amber-50',    border: 'border-amber-200',  text: 'text-amber-700',   dot: 'bg-amber-500'   },
      calculation:   { bg: 'bg-emerald-50',  border: 'border-emerald-200',text: 'text-emerald-700', dot: 'bg-emerald-500' },
      approval:      { bg: 'bg-pink-50',     border: 'border-pink-200',   text: 'text-pink-700',    dot: 'bg-pink-500'    },
      execution:     { bg: 'bg-blue-50',     border: 'border-blue-200',   text: 'text-blue-700',    dot: 'bg-blue-500'    },
      accounting:    { bg: 'bg-purple-50',   border: 'border-purple-200', text: 'text-purple-700',  dot: 'bg-purple-500'  },
      reporting:     { bg: 'bg-teal-50',     border: 'border-teal-200',   text: 'text-teal-700',    dot: 'bg-teal-500'    },
      error_handling:{ bg: 'bg-red-50',      border: 'border-red-200',    text: 'text-red-700',     dot: 'bg-red-500'     },
    };

    function setView(view) {
      currentView = view;
      document.getElementById('flowView').classList.toggle('hidden', view !== 'flow');
      document.getElementById('jsonView').classList.toggle('hidden', view !== 'json');
      document.getElementById('viewFlow').className = view === 'flow'
        ? 'view-btn px-3 py-1 rounded-lg text-sm font-medium bg-indigo-600 text-white'
        : 'view-btn px-3 py-1 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100';
      document.getElementById('viewJson').className = view === 'json'
        ? 'view-btn px-3 py-1 rounded-lg text-sm font-medium bg-indigo-600 text-white'
        : 'view-btn px-3 py-1 rounded-lg text-sm font-medium text-gray-600 hover:bg-gray-100';
    }

    function copyJson() {
      if (!currentWorkflow) return;
      navigator.clipboard.writeText(JSON.stringify(currentWorkflow, null, 2));
    }

    function renderWorkflow(workflow, validation) {
      currentWorkflow = workflow;

      // Meta
      const meta = document.getElementById('workflowMeta');
      meta.innerHTML = `
        <div class="flex items-start justify-between gap-4">
          <div>
            <h3 class="font-semibold text-gray-900">${escHtml(workflow.workflow_name || 'Untitled Workflow')}</h3>
            <p class="text-sm text-gray-500 mt-0.5">${escHtml(workflow.description || '')}</p>
          </div>
          ${workflow.estimated_employees ? `<span class="text-xs bg-gray-100 text-gray-600 rounded-full px-3 py-1 whitespace-nowrap">${workflow.estimated_employees} employees</span>` : ''}
        </div>
        <div class="mt-3 flex items-center gap-2 text-xs text-gray-400">
          <span>${(workflow.flow || []).length} steps</span>
        </div>
      `;

      // Steps
      const container = document.getElementById('flowSteps');
      container.innerHTML = '';
      (workflow.flow || []).forEach((step, idx) => {
        const cat = step.category || 'ingestion';
        const colors = CATEGORY_COLORS[cat] || CATEGORY_COLORS.ingestion;
        const configEntries = Object.entries(step.config || {}).filter(([,v]) => v !== null && v !== '');

        const card = document.createElement('div');
        card.className = `step-card`;
        card.style.animationDelay = `${idx * 40}ms`;

        card.innerHTML = `
          ${idx > 0 ? '<div class="connector"></div>' : ''}
          <div class="flex items-start gap-3 p-4 bg-white rounded-xl border ${colors.border} shadow-sm category-${cat} step-accent">
            <div class="flex-shrink-0 w-6 h-6 rounded-full ${colors.bg} ${colors.text} flex items-center justify-center text-xs font-bold">${idx + 1}</div>
            <div class="flex-1 min-w-0">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="font-mono text-sm font-semibold text-gray-800">${escHtml(step.step)}</span>
                <span class="text-xs px-2 py-0.5 rounded-full ${colors.bg} ${colors.text}">${escHtml(cat)}</span>
              </div>
              ${step.description ? `<p class="text-xs text-gray-500 mt-1">${escHtml(step.description)}</p>` : ''}
              ${configEntries.length > 0 ? `
                <div class="mt-2 flex flex-wrap gap-2">
                  ${configEntries.map(([k, v]) => `
                    <span class="text-xs bg-gray-100 text-gray-600 rounded px-2 py-0.5">
                      <span class="text-gray-400">${escHtml(k)}:</span> ${escHtml(String(v))}
                    </span>
                  `).join('')}
                </div>` : ''}
            </div>
          </div>
        `;
        container.appendChild(card);
      });

      // JSON
      document.getElementById('jsonOutput').textContent = JSON.stringify(workflow, null, 2);

      // Show panels
      document.getElementById('emptyState').classList.add('hidden');
      document.getElementById('flowView').classList.toggle('hidden', currentView !== 'flow');
      document.getElementById('jsonView').classList.toggle('hidden', currentView !== 'json');

      // Validation
      renderValidation(validation);
    }

    function renderValidation(validation) {
      const panel = document.getElementById('validationPanel');
      if (!validation) { panel.classList.add('hidden'); return; }

      panel.classList.remove('hidden');
      const isValid = validation.valid;
      panel.className = `rounded-xl border p-4 text-sm space-y-2 ${isValid ? 'bg-emerald-50 border-emerald-200' : 'bg-red-50 border-red-200'}`;

      let html = `<p class="font-medium ${isValid ? 'text-emerald-700' : 'text-red-700'}">
        ${isValid ? '✓ Workflow is valid' : `✗ ${validation.errors.length} validation error(s)`}
      </p>`;
      validation.errors.forEach(e => { html += `<p class="text-red-600 text-xs">⚠ ${escHtml(e)}</p>`; });
      validation.warnings.forEach(w => { html += `<p class="text-amber-600 text-xs">⚡ ${escHtml(w)}</p>`; });
      panel.innerHTML = html;
    }

    function escHtml(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function setLoading(loading) {
      const btn = document.getElementById('generateBtn');
      const icon = document.getElementById('btnIcon');
      const text = document.getElementById('btnText');
      btn.disabled = loading;
      if (loading) {
        btn.classList.add('opacity-75', 'cursor-not-allowed');
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />';
        text.textContent = 'Generating…';
      } else {
        btn.classList.remove('opacity-75', 'cursor-not-allowed');
        icon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z" />';
        text.textContent = 'Generate Workflow';
      }
    }

    async function generate() {
      const prompt = document.getElementById('prompt').value.trim();
      if (!prompt) return;

      setLoading(true);
      document.getElementById('validationPanel').classList.add('hidden');

      try {
        const res = await fetch('/api/generate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ prompt }),
        });
        const data = await res.json();
        if (data.error) throw new Error(data.error);
        renderWorkflow(data.workflow, data.validation);
      } catch (err) {
        const panel = document.getElementById('validationPanel');
        panel.className = 'rounded-xl border p-4 text-sm bg-red-50 border-red-200';
        panel.innerHTML = `<p class="text-red-600 font-medium">Error: ${escHtml(err.message)}</p>`;
        panel.classList.remove('hidden');
      } finally {
        setLoading(false);
      }
    }

    document.getElementById('generateBtn').addEventListener('click', generate);
    document.getElementById('prompt').addEventListener('keydown', e => {
      if (e.key === 'Enter' && (e.metaKey || e.ctrlKey)) generate();
    });

    // Load examples
    fetch('/api/examples').then(r => r.json()).then(examples => {
      const container = document.getElementById('examples');
      examples.forEach(ex => {
        const btn = document.createElement('button');
        btn.className = 'w-full text-left text-sm text-indigo-600 hover:text-indigo-800 hover:bg-indigo-50 rounded-lg px-3 py-2 border border-indigo-100 transition-colors';
        btn.textContent = ex.prompt;
        btn.addEventListener('click', () => {
          document.getElementById('prompt').value = ex.prompt;
        });
        container.appendChild(btn);
      });
    }).catch(() => {});

    // Enrich flow steps with component metadata
    async function enrichWithComponents() {
      const res = await fetch('/api/components');
      window.componentRegistry = {};
      const comps = await res.json();
      comps.forEach(c => { window.componentRegistry[c.name] = c; });
    }
    enrichWithComponents();

    // Patch renderWorkflow to add descriptions from registry
    const _orig = renderWorkflow;
  </script>
</body>
</html>
